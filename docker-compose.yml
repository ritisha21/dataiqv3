version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       dataiq
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL:      postgresql+asyncpg://postgres:postgres@postgres:5432/dataiq
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/dataiq
      REDIS_URL:         redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - model_artifacts:/tmp/dataiq/models
    restart: unless-stopped

  # ── Celery ML worker ────────────────────────────────────────────────────────
  celery_ml:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.cache.celery_app worker
             -Q ml -c 2 --loglevel=info
    env_file: ./backend/.env
    environment:
      DATABASE_URL:      postgresql+asyncpg://postgres:postgres@postgres:5432/dataiq
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/dataiq
      REDIS_URL:         redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - model_artifacts:/tmp/dataiq/models
    restart: unless-stopped

  # ── Celery schema worker ────────────────────────────────────────────────────
  celery_schema:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.cache.celery_app worker
             -Q schema -c 4 --loglevel=info
    env_file: ./backend/.env
    environment:
      DATABASE_URL:      postgresql+asyncpg://postgres:postgres@postgres:5432/dataiq
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/dataiq
      REDIS_URL:         redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  # ── Flower (Celery monitoring) ──────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.cache.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports: ["5555:5555"]
    depends_on: [redis]
    restart: unless-stopped

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: unless-stopped

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend, frontend]
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  model_artifacts:
